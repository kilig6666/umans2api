services:
  umans2api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: umans2api
    restart: unless-stopped
    init: true
    shm_size: "1gb"
    ports:
      - "${HOST_PORT:-18787}:8787"
    environment:
      PYTHONUNBUFFERED: "1"
      UMANS2API_PLAYWRIGHT_NO_SANDBOX: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json
    healthcheck:
      test: ["CMD", "python", "-c", "import json, urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8787/health', timeout=5); json.load(r)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
